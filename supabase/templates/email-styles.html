<!--
  Template base de estilos para emails do Falando com o Profeta
  Cores: Sépia/Dourado (#F4ECD8, #8B7355, #D4C4A8)
  Logo: William Marrion Branham
-->

<style>
  /* Reset e base */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #F4ECD8;
    -webkit-font-smoothing: antialiased;
  }

  /* Container principal */
  .email-wrapper {
    max-width: 600px;
    margin: 0 auto;
    background: linear-gradient(135deg, #FAF3E8 0%, #F4ECD8 100%);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(139, 115, 85, 0.15);
  }

  /* Header com logo */
  .email-header {
    background: linear-gradient(135deg, #8B7355 0%, #A89080 50%, #8B7355 100%);
    padding: 32px 24px;
    text-align: center;
    position: relative;
  }

  .email-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>');
    opacity: 0.3;
  }

  .logo-container {
    position: relative;
    z-index: 1;
  }

  .prophet-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 4px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    object-fit: cover;
  }

  .app-name {
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 700;
    margin-top: 16px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
  }

  .app-tagline {
    color: rgba(255, 255, 255, 0.9);
    font-size: 14px;
    margin-top: 4px;
    font-style: italic;
  }

  /* Corpo do email */
  .email-body {
    padding: 40px 32px;
    color: #5C4D3C;
  }

  .greeting {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #8B7355;
  }

  .message {
    font-size: 16px;
    line-height: 1.8;
    margin-bottom: 24px;
    color: #5C4D3C;
  }

  /* Botão CTA */
  .cta-container {
    text-align: center;
    margin: 32px 0;
  }

  .cta-button {
    display: inline-block;
    background: linear-gradient(135deg, #8B7355 0%, #A89080 100%);
    color: #FFFFFF !important;
    text-decoration: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(139, 115, 85, 0.3);
    transition: all 0.3s ease;
  }

  .cta-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(139, 115, 85, 0.4);
  }

  /* Link alternativo */
  .alt-link {
    text-align: center;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #D4C4A8;
  }

  .alt-link p {
    font-size: 13px;
    color: #6B5D4C;
    margin-bottom: 8px;
  }

  .alt-link a {
    color: #8B7355;
    word-break: break-all;
    font-size: 13px;
  }

  /* Footer */
  .email-footer {
    background: linear-gradient(135deg, #E8DCC8 0%, #D4C4A8 100%);
    padding: 24px 32px;
    text-align: center;
    border-top: 1px solid #D4C4A8;
  }

  .footer-text {
    font-size: 13px;
    color: #6B5D4C;
    margin-bottom: 8px;
  }

  .footer-brand {
    font-size: 14px;
    font-weight: 600;
    color: #8B7355;
  }

  .footer-verse {
    font-size: 12px;
    color: #8B7355;
    font-style: italic;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed rgba(139, 115, 85, 0.3);
  }

  /* Destaques */
  .highlight-box {
    background: rgba(139, 115, 85, 0.08);
    border-left: 4px solid #8B7355;
    padding: 20px;
    margin: 24px 0;
    border-radius: 0 8px 8px 0;
  }

  .highlight-box p {
    margin: 0;
    font-size: 15px;
    color: #5C4D3C;
  }

  /* Responsivo */
  @media (max-width: 600px) {
    .email-wrapper {
      margin: 0;
      border-radius: 0;
    }

    .email-body {
      padding: 32px 24px;
    }

    .app-name {
      font-size: 20px;
    }

    .prophet-avatar {
      width: 64px;
      height: 64px;
    }
  }
</style>
